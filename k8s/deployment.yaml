apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-loan-ml-api
  namespace: default
  labels:
    app: bank-loan-ml-api
    version: "1.0.0"
    environment: production
spec:
  replicas: 3

  selector:
    matchLabels:
      app: bank-loan-ml-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          
      maxUnavailable: 0   

  template:
    metadata:
      labels:
        app: bank-loan-ml-api
        version: "1.0.0"
    spec:
     
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: bank-loan-ml-api
          image: PLACEHOLDER_ECR_IMAGE_URI
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          env:
            - name: PORT
              value: "5000"
            - name: FLASK_DEBUG
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AWS_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: "250m"       
              memory: "512Mi"
            limits:
              cpu: "500m"      
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30   
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

         
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   
            capabilities:
              drop:
                - ALL

      restartPolicy: Always

      terminationGracePeriodSeconds: 30
