apiVersion: v1
kind: Service
metadata:
  name: bank-loan-ml-service
  namespace: default
  labels:
    app: bank-loan-ml-api
  annotations:
    
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

spec:
  type: LoadBalancer

  ports:
    - name: http
      port: 80              
      targetPort: 5000      
      protocol: TCP

  selector:
    app: bank-loan-ml-api

  sessionAffinity: None

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bank-loan-ml-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bank-loan-ml-api
  minReplicas: 2       
  maxReplicas: 10      
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   
